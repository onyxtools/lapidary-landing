<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>contact — Rove</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90' fill='%23c8963c'>◈</text></svg>" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #111111; --surface: #1c1c1c; --surface-2: #222222;
    --border: rgba(255,255,255,0.07); --border-2: rgba(255,255,255,0.12);
    --text: #efefef; --text-2: #888888; --text-3: #444444;
    --red: #f87171;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; font-size: 15px; line-height: 1.6; -webkit-font-smoothing: antialiased; min-height: 100vh; display: flex; flex-direction: column; }
  .content { flex: 1; }
  a { color: var(--text-2); }
  nav { position: sticky; top: 0; background: rgba(17,17,17,0.9); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); padding: 0 40px; height: 56px; display: flex; align-items: center; justify-content: space-between; }
  .nav-logo { display: flex; align-items: center; gap: 7px; font-size: 15px; font-weight: 600; color: var(--text); text-decoration: none; }
  .nav-logo-dot { width: 6px; height: 6px; background: var(--text); border-radius: 50%; }
  .nav-links { display: flex; align-items: center; gap: 8px; }
  .nav-link { color: var(--text-2); font-size: 13px; padding: 6px 10px; border-radius: 5px; transition: color 0.15s; text-decoration: none; }
  .nav-link:hover { color: var(--text); }
  .nav-cta { background: var(--text); color: var(--bg); border-radius: 6px; padding: 7px 16px; font-size: 13px; font-weight: 600; text-decoration: none; transition: opacity 0.15s; }
  .nav-cta:hover { opacity: 0.88; }
  .content { max-width: 680px; margin: 0 auto; padding: 64px 40px 80px; }
  h1 { font-size: 28px; font-weight: 600; letter-spacing: -0.01em; color: var(--text); margin-bottom: 6px; }
  h2 { font-size: 16px; font-weight: 600; color: var(--text); margin: 32px 0 10px; }
  p { color: var(--text-2); font-size: 14px; line-height: 1.8; margin-bottom: 12px; }
  ul { color: var(--text-2); font-size: 14px; line-height: 1.8; margin-bottom: 12px; padding-left: 20px; }
  li { margin-bottom: 4px; }
  .doc-label { font-size: 11px; font-weight: 500; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 8px; }
  .doc-date { font-size: 13px; color: var(--text-3); margin-bottom: 40px; }
  footer { padding: 24px 40px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; border-top: 1px solid var(--border); }
  .footer-logo { display: flex; align-items: center; gap: 6px; font-size: 13px; font-weight: 600; color: var(--text-2); }
  .footer-logo-dot { width: 5px; height: 5px; background: var(--text-2); border-radius: 50%; }
  .footer-links { display: flex; gap: 16px; }
  .footer-link { font-size: 12px; color: var(--text-3); text-decoration: none; transition: color 0.15s; }
  .footer-link:hover { color: var(--text-2); }
  .footer-copy { font-size: 12px; color: var(--text-3); }
  .contact-link { display: inline-block; margin-top: 16px; background: var(--text); color: var(--bg); border-radius: 6px; padding: 10px 20px; font-size: 14px; font-weight: 600; text-decoration: none; transition: opacity 0.15s; }
  .contact-link:hover { opacity: 0.88; }
  @media (max-width: 640px) { nav { padding: 0 20px; } .content { padding: 40px 20px 60px; } footer { padding: 20px; flex-direction: column; } }
</style>
</head>
<body>

<nav>
  <div class="nav-logo"><div class="nav-logo-dot"></div> Rove</div>
  <div class="nav-links">
    <a class="nav-link" href="index.html">Home</a>
    <a class="nav-cta" href="https://lapidary.pages.dev">Open app</a>
  </div>
</nav>

<div class="content">
  <div class="doc-label">get in touch</div>
  <h1>Contact</h1>
  <p>Have a question, a privacy or data request, want to report a bug, or just want to say hello?</p>
  <a class="contact-link" href="mailto:info@onyxtools.org">contact us</a>
</div>

<footer>
  <div class="footer-logo"><div class="footer-logo-dot"></div> Rove</div>
  <div class="footer-links">
    <a class="footer-link" href="index.html">Home</a>
    <a class="footer-link" href="tos.html">Terms</a>
    <a class="footer-link" href="privacy.html">Privacy</a>
    <a class="footer-link" href="contact.html">Contact</a>
    <a class="footer-link" href="https://lapidary.pages.dev">Go to Rove</a>
  </div>
  <div class="footer-copy">© 2026 Rove</div>
</footer>

</body>
</html>
